spring.application.name=agendamento

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Oracle datasource (subir via 'docker compose up -d' nesta mesma pasta)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${DB_USER:system}
spring.datasource.password=${DB_PASSWORD:oracle}

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/oracle
# baseline-version=0 garante que V1 rode mesmo conectando como SYSTEM (schema com tabelas internas Oracle).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
