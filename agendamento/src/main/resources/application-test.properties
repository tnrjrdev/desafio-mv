# Perfil de testes: H2 em memoria, isolado de Oracle.
spring.datasource.url=jdbc:h2:mem:agendamento;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/h2
# Reseta as flags do default (Oracle) que nao se aplicam ao H2 fresh.
spring.flyway.baseline-on-migrate=false
