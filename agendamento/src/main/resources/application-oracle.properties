# Perfil Oracle (ex: Oracle XE local em Docker)
# docker run -d -p 1521:1521 -e ORACLE_PASSWORD=oracle gvenzl/oracle-xe:21-slim-faststart
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${DB_USER:system}
spring.datasource.password=${DB_PASSWORD:oracle}

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/oracle

# baseline-on-migrate permite rodar migrations em um schema que ja tem tabelas
# (ex: usuario SYSTEM ou schema com objetos pre-existentes).
# baseline-version=0 garante que TODAS as migrations (V1, V2, V3) sejam executadas;
# o default (1) marca V1 como ja-aplicada e a aplicacao pula direto pra V2.
# Em producao, o correto e criar um schema dedicado para a aplicacao - veja o README.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
